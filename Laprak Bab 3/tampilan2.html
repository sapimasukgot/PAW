<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="left-panel">
            <div class="left-header bg-light-blue">
                <h1>CREATE YOUR<br>ACCOUNT</h1>
            </div>
            <div class="illustration-box">
                <picture>
                    <img src="gmbr2.jpeg" alt="Ilustrasi tim kolaborasi">
                </picture>
            </div>
        </div>

        <div class="right-panel bg-dark-blue">
            <h2>REGISTER</h2>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm Password">
            </div>
            
            <button class="submit-btn">REGISTER</button>
            
            <div class="divider">
                <span>Or Register with</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-icon">
                    <picture>
                        <img src="Google logo.jpeg" alt="Google Logo">
                    </picture>
                </button>
                <button type="button" class="social-icon tiktok-icon">
                    <picture>
                        <img src="tiktok.jpeg" alt="TikTok Logo"> 
                    </picture>
                </button>
            </div>
            
        </div>

    </div>

</body>
</html>
